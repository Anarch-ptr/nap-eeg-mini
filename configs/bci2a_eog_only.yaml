experiment: bci2a_eog_only_artifact_audit
seed: 42

data:
  name: bci2a_eog_only
  subject_id: 1
  data_dir: data/moabb
  fmin: 8.0
  fmax: 32.0
  tmin: 0.0
  tmax: 4.0
  train_ratio: 0.8
  normalize: true
  num_channels: 3
  num_samples: 1001
  num_classes: 4

model:
  name: eegnet
  f1: 8
  d: 2
  f2: 16
  kernel_length: 64
  dropout: 0.25

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001

audit:
  enabled: false

output:
  table_dir: results/bci2a_eog_only/seed_42/subject_01
  training_history_file: metrics.csv
  split_indices_file: split_indices.json
  resolved_config_file: resolved_config.yaml
  run_summary_file: run_summary.json
  best_checkpoint_file: best_validation_checkpoint.pt
  experiment_summary_file: eog_only_summary.csv
